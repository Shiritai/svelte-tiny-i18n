name: Release

on:
    push:
        tags: ['v*']

permissions:
    contents: write # create the GitHub Release
    id-token: write # npm Trusted Publishing (OIDC) + provenance attestation

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        name: Publish to npm
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # full history so release notes can diff prior tags
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org
                  cache: pnpm
            # Trusted Publishing (keyless OIDC) requires npm >= 11.5.1.
            - name: Ensure npm supports Trusted Publishing
              run: npm install -g npm@latest
            - run: pnpm install --frozen-lockfile

            - name: Verify tag matches package.json version
              run: |
                  TAG="${GITHUB_REF_NAME#v}"
                  PKG="$(node -p "require('./package.json').version")"
                  if [ "$TAG" != "$PKG" ]; then
                    echo "::error::tag v$TAG does not match package.json version $PKG"
                    exit 1
                  fi

            - run: pnpm run lint
            - run: pnpm test
            - run: pnpm run test:types

            # setup-node's registry-url writes a placeholder //registry/:_authToken
            # into .npmrc; npm would use that bogus token for the publish PUT (-> 404)
            # instead of OIDC. Drop the token line, keep the registry line, so Trusted
            # Publishing authenticates the PUT.
            - name: Use OIDC for npm auth (drop placeholder token)
              run: sed -i '/_authToken=/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

            # prepublishOnly builds dist; OIDC supplies the publish token + provenance.
            # Skip if this version is already on npm so re-running a tag is safe.
            - name: Publish to npm
              run: |
                  NAME="$(node -p "require('./package.json').name")"
                  VERSION="$(node -p "require('./package.json').version")"
                  if [ -n "$(npm view "$NAME@$VERSION" version 2>/dev/null)" ]; then
                    echo "$NAME@$VERSION already published; skipping."
                  else
                    npm publish --provenance --access public
                  fi

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
                    || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
