name: CI

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: Lint, types & build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm run lint
            - run: pnpm run test:types
            - run: pnpm run build

    test:
        name: Test (node ${{ matrix.node }}, svelte ${{ matrix.svelte }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [20, 22, 24]
                svelte: [4, 5]
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            # Exercise the supported Svelte peer range; only svelte/store is used,
            # whose API is stable across 4.x and 5.x.
            - name: Pin Svelte ${{ matrix.svelte }}
              run: pnpm add -D svelte@${{ matrix.svelte }}
            - run: pnpm test

    coverage:
        name: Coverage gate
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            # Prints the summary and fails if coverage drops below the
            # thresholds set in vitest.config.ts.
            - run: pnpm run test:coverage
